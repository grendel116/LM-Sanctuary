<svg xmlns="http://www.w3.org/2000/svg" viewBox="5 3 22 15" width="100%" height="100%" shape-rendering="crispEdges">
  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-1.5px); }
    }
    @keyframes blink {
      0%, 92%, 100% { opacity: 1; }
      96% { opacity: 0; }
    }
    @keyframes wings-flap {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.4); }
    }
    .dragon {
      animation: float 1s ease-in-out infinite;
    }
    .visor-eyes {
      animation: blink 2.8s infinite;
    }
    .wings {
      transform-origin: 16px 14px;
      animation: float 1s ease-in-out infinite, wings-flap 0.6s ease-in-out infinite;
    }
  </style>
  <g class="wings">
    <!-- Left Wing -->
    <path d="M12,10 h-4 v-2 h-2 v2 h1 v2 h2 v1 h3 z" fill="#94a3b8"/>
    <!-- Right Wing -->
    <path d="M20,10 h 4 v-2 h 2 v2 h-1 v2 h-2 v-1 h-3 z" fill="#94a3b8"/>
  </g>
  <g class="dragon">
    <!-- Body (Steel/Chrome shades) -->
    <rect x="14" y="11" width="4" height="6" fill="#cbd5e1"/>
    <!-- Tail -->
    <path d="M18,16 h2 v-1 h1 v-1 h1 v1 h-1 v1 h-2 v1 h-1 z" fill="#94a3b8"/>
    <!-- Head -->
    <rect x="12" y="6" width="8" height="6" fill="#cbd5e1"/>
    <!-- Dragon Horns -->
    <rect x="12" y="4" width="2" height="2" fill="#94a3b8"/>
    <rect x="18" y="4" width="2" height="2" fill="#94a3b8"/>
    <!-- Steel Visor -->
    <rect x="11" y="8" width="10" height="3" fill="#1e293b"/>
    <!-- Shifting Pixel Eyes inside Visor -->
    <g class="visor-eyes" fill="#38bdf8">
      <rect x="13" y="9" width="2" height="1"/>
      <rect x="17" y="9" width="2" height="1"/>
    </g>
  </g>
</svg>
