<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 3 20 17" width="100%" height="100%" shape-rendering="crispEdges">
  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-1.5px); }
    }
    @keyframes wings {
      0%, 100% { transform: scaleX(1); }
      50% { transform: scaleX(0.4); }
    }
    .body {
      animation: float 1.2s ease-in-out infinite;
    }
    .wing-l {
      transform-origin: 16px 14px;
      animation: float 1.2s ease-in-out infinite, wings 0.5s ease-in-out infinite;
    }
    .wing-r {
      transform-origin: 16px 14px;
      animation: float 1.2s ease-in-out infinite, wings 0.5s ease-in-out infinite;
      animation-delay: 0.25s;
    }
  </style>
  <g class="wing-l">
    <!-- Left Wing Pixel Art -->
    <path d="M13,9 h-3 v1 h-2 v2 h-1 v3 h1 v2 h2 v1 h3 v-1 h1 v-2 h1 v-3 h-1 v-2 h-1 z" fill="#c084fc"/>
  </g>
  <g class="wing-r">
    <!-- Right Wing Pixel Art -->
    <path d="M19,9 h3 v1 h2 v2 h1 v3 h-1 v2 h-2 v1 h-3 v-1 h-1 v-2 h-1 v-3 h-1 v-2 h-1 z" fill="#c084fc"/>
  </g>
  <g class="body">
    <!-- Head -->
    <rect x="14" y="5" width="4" height="4" fill="#a855f7"/>
    <!-- Hair (long silver/white top) -->
    <rect x="13" y="4" width="6" height="2" fill="#f8fafc"/>
    <rect x="13" y="6" width="1" height="5" fill="#f8fafc"/>
    <rect x="18" y="6" width="1" height="5" fill="#f8fafc"/>
    <!-- Eyes (1-bit purple) -->
    <rect x="15" y="6" width="1" height="1" fill="#c084fc"/>
    <rect x="17" y="6" width="1" height="1" fill="#c084fc"/>
    <!-- Body/Dress -->
    <rect x="15" y="9" width="2" height="6" fill="#a855f7"/>
    <rect x="14" y="11" width="4" height="4" fill="#a855f7"/>
    <!-- Legs -->
    <rect x="15" y="15" width="1" height="4" fill="#a855f7"/>
    <rect x="17" y="15" width="1" height="4" fill="#a855f7"/>
  </g>
</svg>
